<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devoir de mémoire — Canicule, juin 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Archivo:ital,wght@0,400;0,500;0,700;0,800;1,500&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161310; --paper:#EDE6D6;
    --bg-jaune:#E8C468; --bg-orange:#E8622B; --bg-rouge:#8B1E1E;
    --bg:#1b1815; --panel:#2a2620; --accent:#c9622b; --accent2:#8b96a0; --text:#EDE6D6;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: var(--bg); color: var(--text); font-family:'Archivo', sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:28px 14px; transition: background .6s ease;
  }
  .stage{ width:100%; max-width:880px; }
  h1,h2,h3,.headline{ font-family:'Bangers', cursive; letter-spacing:.5px; }
  .eyebrow{ font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color: var(--accent); opacity:.9; }
  .temp-tag{ font-family:'JetBrains Mono', monospace; font-weight:600; }

  .panel{ position:relative; background: var(--panel); border-radius:2px; padding:26px 26px 22px; margin-bottom:18px; }
  .panel::before, .panel::after{ content:""; position:absolute; inset:-6px; border:3px solid var(--ink); pointer-events:none; }
  .panel::before{ transform: rotate(-.35deg); }
  .panel::after{ transform: rotate(.3deg); opacity:.55; }

  .cover{ text-align:center; padding:46px 26px 34px; }
  .cover h1{ font-size:52px; line-height:1.05; margin:0 0 6px; color:var(--paper); text-shadow:3px 3px 0 var(--ink); }
  .cover .sub{ font-size:16px; opacity:.85; max-width:540px; margin:10px auto 26px; line-height:1.5; }
  .cover-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-top:10px; }

  .btn{ font-family:'Bangers', cursive; font-size:19px; letter-spacing:.5px; background: var(--accent); color:var(--ink);
    border:3px solid var(--ink); border-radius:4px; padding:11px 24px; cursor:pointer;
    box-shadow:4px 4px 0 var(--ink); transition: transform .12s ease, box-shadow .12s ease; }
  .btn:hover{ transform: translate(-2px,-2px); box-shadow:6px 6px 0 var(--ink); }
  .btn:active{ transform: translate(1px,1px); box-shadow:2px 2px 0 var(--ink); }
  .btn.ghost{ background:transparent; color:var(--text); }
  .btn.small{ font-size:14px; padding:7px 14px; box-shadow:3px 3px 0 var(--ink); }
  .link-plain{ color: var(--accent); text-decoration:underline; cursor:pointer; font-size:13px; font-family:'JetBrains Mono',monospace; }

  .grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:16px; }
  .card{ cursor:pointer; border:3px solid var(--ink); border-radius:4px; background: var(--cbg); padding:16px; text-align:left;
    display:flex; flex-direction:column; gap:8px; transition: transform .15s ease; }
  .card:hover{ transform: translateY(-4px); }
  .card svg{ width:46px; height:46px; }
  .card h3{ margin:0; font-size:24px; color:var(--cink); }
  .card .tag{ font-size:12.5px; opacity:.85; color:var(--cink); line-height:1.35; }
  .card .arrow{ align-self:flex-end; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--cink); }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:14px; margin-bottom:14px; flex-wrap:wrap; }
  .who{ display:flex; align-items:center; gap:10px; }
  .who svg{ width:34px; height:34px; }
  .who .name{ font-family:'Bangers',cursive; font-size:20px; }
  .who .tag{ font-size:11.5px; opacity:.75; }

  .gauge{ display:flex; align-items:center; gap:8px; }
  .gauge-track{ position:relative; width:150px; height:14px; border:2px solid var(--ink); background:#000000aa; border-radius:8px; overflow:hidden; }
  .gauge-fill{ position:absolute; left:0; top:0; bottom:0; width:0%; background: var(--zone-color, var(--bg-jaune)); transition: width .5s ease, background .5s ease; }
  .gauge-ticks{ position:absolute; inset:0; display:flex; }
  .gauge-ticks span{ flex:1; border-right:1px solid rgba(0,0,0,.35); }
  .gauge-label{ font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em; }

  .illustration{ display:block; width:100%; max-width:230px; height:auto; margin:0 auto 16px; }
  .illustration svg{ width:100%; height:auto; display:block; }

  .act-eyebrow{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px;}
  .act-title{ font-size:29px; margin:0 0 10px; }
  .narration{ font-size:16.5px; line-height:1.55; margin-bottom:6px; }
  .narration::first-letter{ font-family:'Bangers',cursive; font-size:36px; float:left; line-height:.8; margin-right:6px; color:var(--accent); }
  .tip{ font-size:13.5px; opacity:.8; font-style:italic; margin-bottom:16px; }

  .choices{ display:flex; flex-direction:column; gap:10px; margin-top:14px; }
  .choice-btn{ text-align:left; background: rgba(0,0,0,.18); border:2px solid var(--ink); color:var(--text); padding:13px 16px;
    border-radius:4px; cursor:pointer; font-family:'Archivo', sans-serif; font-size:14.5px; font-weight:600;
    display:flex; gap:10px; align-items:flex-start; transition: background .15s ease, transform .1s ease; }
  .choice-btn:hover{ background: rgba(0,0,0,.32); transform: translateX(2px); }
  .choice-btn .bullet{ font-family:'Bangers',cursive; color:var(--accent); font-size:18px; }

  .consequence-box{ margin-top:16px; padding:14px 16px; border-left:4px solid var(--accent); background: rgba(0,0,0,.22); font-size:14.5px; line-height:1.5; font-style:italic; }
  .fact-card{ margin-top:14px; padding:14px 16px; border:2px dashed var(--accent2); background: rgba(255,255,255,.04); font-size:13px; line-height:1.5; }
  .tips-card{ margin:18px 0; padding:16px 18px; border:2px solid var(--accent); border-radius:6px; background: rgba(255,255,255,.03); }
  .tips-list{ margin:8px 0 0; padding-left:20px; font-size:13.5px; line-height:1.55; }
  .tips-list li{ margin-bottom:9px; }
  .tips-list li:last-child{ margin-bottom:0; }
  .tips-list a{ color: var(--accent); text-decoration:underline; }
  .fact-card .flabel{ font-family:'JetBrains Mono',monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--accent2); display:block; margin-bottom:5px; }
  .fact-card .fsource{ display:block; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:10.5px; }
  .fact-card .fsource a{ color:var(--accent); text-decoration:underline; margin-right:10px; }
  .continue-row{ margin-top:18px; display:flex; justify-content:flex-end; gap:10px; flex-wrap:wrap; }

  .zone-banner{ text-align:center; padding:22px 14px; margin-bottom:6px; border:3px solid var(--ink); background: var(--zone-color); color: var(--ink); }
  .zone-banner h2{ font-size:32px; margin:0 0 4px; }
  .epilogue-text{ font-size:15.5px; line-height:1.6; margin:16px 0; }
  .threshold-note{ margin-top:18px; padding:14px 16px; border:2px dashed var(--accent2); font-size:13.5px; line-height:1.55; }
  .end-actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }

  .sources-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:10px; }
  .sources-list li{ padding:11px 13px; border:1.5px solid var(--ink); background: rgba(0,0,0,.18); font-size:13.5px; line-height:1.45; }
  .sources-list b{ display:block; margin-bottom:3px; font-family:'Bangers',cursive; font-size:15px; color:var(--accent); }
  .sources-list a{ color:var(--accent); text-decoration:underline; word-break:break-all; }

  .screen{ display:none; } .screen.active{ display:block; animation: fadeUp .35s ease; }
  @keyframes fadeUp{ from{ opacity:0; transform: translateY(8px);} to{opacity:1; transform:translateY(0);} }
  footer.credit{ text-align:center; font-family:'JetBrains Mono',monospace; font-size:10.5px; opacity:.5; margin-top:16px; }

  /* ===== Carte à retourner (flip card) — Acte 1 Karim =====
     IMPORTANT : aucune propriété 3D (perspective / backface-visibility / rotateY)
     n'est utilisée ici. Ces propriétés, combinées à une ombre portée, peuvent casser
     la détection de clic sur certains navigateurs même quand tout s'affiche
     correctement. L'effet de "retournement" est simulé en 2D pur (zoom + fondu),
     ce qui garantit que les boutons restent cliquables dans tous les cas. */
  .flip-card{
    width:min(100%, 420px); max-width:420px; margin:0 auto 18px; cursor:pointer; user-select:none;
  }
  .flip-card.static{ cursor:default; }
  @media (max-width:560px){ .flip-card{ width:min(100%, 300px); } }
  .flip-card-face{
    position:relative; width:100%; padding-top:132%;
    border:3px solid var(--ink); border-radius:6px; overflow:hidden;
    box-shadow:6px 8px 0 rgba(0,0,0,.55);
  }
  .face-content{ position:absolute; inset:0; }
  .flip-front-face{ background:var(--ink); }
  .flip-back-face{ background:#0a0a0a; }
  .flip-back-face .face-content{
    display:flex; flex-direction:column; align-items:stretch; justify-content:center;
    padding:22px 20px; text-align:left; color:#EDE6D6;
  }
  .flip-back-inner{ display:flex; flex-direction:column; gap:14px; max-height:100%; overflow-y:auto; }
  .flip-eyebrow{ font-family:'JetBrains Mono',monospace; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; opacity:.65; margin:0; text-align:center; }
  .flip-question{
    font-family:'Bangers',cursive; font-size:24px; line-height:1.22; margin:0; text-align:center; color:#fff;
  }
  .flip-choices{ display:flex; flex-direction:column; gap:9px; margin-top:4px; }
  .flip-choice-btn{
    text-align:left; background:rgba(255,255,255,.06); border:2px solid var(--bg-orange); color:#EDE6D6;
    padding:11px 13px; border-radius:4px; cursor:pointer; font-family:'Archivo',sans-serif; font-size:13px; font-weight:600;
    display:flex; gap:9px; align-items:flex-start; transition: background .15s ease, transform .1s ease, border-color .15s ease;
    position:relative; z-index:2;
  }
  .flip-choice-btn:hover{ background:rgba(255,255,255,.14); border-color:#fff; transform:translateX(2px); }
  .flip-choice-btn .bullet{ font-family:'Bangers',cursive; color:var(--bg-orange); font-size:16px; flex-shrink:0; }
  /* Une seule photo héros, en grand format */
  .hero-photo{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition: transform .6s cubic-bezier(.16,1,.3,1); }
  .flip-card:hover .hero-photo{ transform: scale(1.12); }
  .hero-caption{
    position:absolute; left:0; right:0; bottom:0; z-index:5; padding:22px 16px 14px;
    background:linear-gradient(to top, rgba(0,0,0,.75), rgba(0,0,0,0));
    color:#fff; font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.08em; text-transform:uppercase;
  }
  .flip-hint{
    position:absolute; bottom:8px; right:8px; font-family:'JetBrains Mono',monospace; font-size:9.5px; letter-spacing:.04em;
    background:rgba(0,0,0,.6); color:#fff; padding:4px 8px; border-radius:10px; z-index:7;
    animation: pulseHint 2.2s ease-in-out infinite;
  }
  @keyframes pulseHint{ 0%,100%{ transform:scale(1); opacity:.85; } 50%{ transform:scale(1.08); opacity:1; } }
  @media (prefers-reduced-motion: reduce){
    .flip-hint{ animation:none; }
    .flip-card-face{ transition-duration:.01ms !important; }
  }

  @media (max-width:560px){ .cover h1{ font-size:34px; } .topbar{ align-items:flex-start; } }
</style>
</head>
<body>
<div class="stage" id="stage"></div>

<script>
/* =========================================================
   ICONES PERSONNAGES (sélection)
   ========================================================= */
const ICONS = {
  amina: `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><circle cx="32" cy="20" r="10"/><path d="M14 54c0-12 8-18 18-18s18 6 18 18" /><path d="M8 40c6-2 10 2 10 2M56 40c-6-2-10 2-10 2" stroke-dasharray="3 3"/></svg>`,
  julien: `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><path d="M32 54V26"/><path d="M32 30c-8-2-12-10-12-16 8 0 14 6 12 16Z"/><path d="M32 26c8-2 12-8 12-14-8 0-14 6-12 14Z"/><circle cx="48" cy="14" r="6"/></svg>`,
  sophie: `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><path d="M10 30 32 12l22 18"/><path d="M16 28v24h32V28"/><path d="M32 12v10M26 12l6 6 6-6M26 18l6-6 6 6" /></svg>`,
  karim: `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><path d="M8 40h48l-6-14a20 20 0 0 0-36 0Z"/><rect x="14" y="40" width="36" height="6"/><path d="M22 52h4M38 52h4"/></svg>`,
  famille: `<svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="3"><circle cx="22" cy="16" r="7"/><path d="M10 40c0-9 6-13 12-13s12 4 12 13"/><circle cx="46" cy="26" r="5"/><path d="M38 42c0-6 4-9 8-9s8 3 8 9"/></svg>`
};

/* =========================================================
   ILLUSTRATIONS CARTOON PAR ACTE (SVG dessinées à la main)
   ========================================================= */
const SUNRAYS = `<g stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="130" y1="10" x2="130" y2="0"/><line x1="150" y1="18" x2="158" y2="10"/><line x1="110" y1="18" x2="102" y2="10"/></g>`;
function sun(cx,cy,r){ return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="currentColor" stroke-width="3"/>
  <g stroke="currentColor" stroke-width="3" stroke-linecap="round">
  <line x1="${cx}" y1="${cy-r-8}" x2="${cx}" y2="${cy-r-1}"/>
  <line x1="${cx+r+8}" y1="${cy}" x2="${cx+r+1}" y2="${cy}"/>
  <line x1="${cx}" y1="${cy+r+8}" x2="${cx}" y2="${cy+r+1}"/>
  <line x1="${cx-r-8}" y1="${cy}" x2="${cx-r-1}" y2="${cy}"/>
  <line x1="${cx+r*0.7+6}" y1="${cy-r*0.7-6}" x2="${cx+r*0.7}" y2="${cy-r*0.7}"/>
  <line x1="${cx-r*0.7-6}" y1="${cy-r*0.7-6}" x2="${cx-r*0.7}" y2="${cy-r*0.7}"/>
  </g>`; }
function heatWaves(x,y,w){ return `<g stroke="currentColor" stroke-width="2.5" fill="none" opacity=".7">
  <path d="M${x} ${y} q6 -8 12 0 t12 0 t12 0"/>
  <path d="M${x} ${y+10} q6 -8 12 0 t12 0 t12 0"/></g>`; }

const ILLUS = {
  amina: [
    // Acte 1 — chambre, sun through window, wavy heat
    `<svg viewBox="0 0 200 130">${sun(160,26,14)}<rect x="20" y="70" width="70" height="8" fill="none" stroke="currentColor" stroke-width="3"/><rect x="24" y="40" width="30" height="30" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="60" cy="66" r="8" fill="none" stroke="currentColor" stroke-width="3"/>${heatWaves(30,90,50)}</svg>`,
    // Acte 2 — visite aide à domicile
    `<svg viewBox="0 0 200 130"><circle cx="70" cy="46" r="12" fill="none" stroke="currentColor" stroke-width="3"/><path d="M50 90c0-16 9-24 20-24s20 8 20 24" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="140" cy="42" r="12" fill="none" stroke="currentColor" stroke-width="3"/><path d="M120 90c0-16 9-24 20-24s20 8 20 24" fill="none" stroke="currentColor" stroke-width="3"/><rect x="98" y="72" width="10" height="16" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>`,
    // Acte 3 — pièce fraîche, volets fermés
    `<svg viewBox="0 0 200 130">${sun(170,20,12)}<rect x="40" y="30" width="60" height="70" fill="none" stroke="currentColor" stroke-width="3"/><line x1="40" y1="42" x2="100" y2="42" stroke="currentColor" stroke-width="3"/><line x1="40" y1="54" x2="100" y2="54" stroke="currentColor" stroke-width="3"/><line x1="40" y1="66" x2="100" y2="66" stroke="currentColor" stroke-width="3"/><line x1="40" y1="78" x2="100" y2="78" stroke="currentColor" stroke-width="3"/><line x1="40" y1="90" x2="100" y2="90" stroke="currentColor" stroke-width="3"/></svg>`,
    // Acte 4 — nuit, téléphone/15
    `<svg viewBox="0 0 200 130"><path d="M150 20a40 40 0 1 0 0 80 34 34 0 1 1 0-80Z" fill="none" stroke="currentColor" stroke-width="3"/><rect x="30" y="50" width="24" height="40" rx="4" fill="none" stroke="currentColor" stroke-width="3"/><text x="34" y="76" font-family="monospace" font-size="16" fill="currentColor">15</text></svg>`
  ],
  julien: [
    `<svg viewBox="0 0 200 130">${sun(170,20,12)}<path d="M20 100 L60 60 L100 100Z" fill="none" stroke="currentColor" stroke-width="3"/><rect x="60" y="80" width="14" height="20" fill="none" stroke="currentColor" stroke-width="3"/><ellipse cx="150" cy="105" rx="20" ry="8" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>`,
    `<svg viewBox="0 0 200 130"><rect x="20" y="40" width="14" height="30" fill="none" stroke="currentColor" stroke-width="3"/><line x1="27" y1="40" x2="27" y2="20" stroke="currentColor" stroke-width="3"/><line x1="60" y1="90" x2="180" y2="90" stroke="currentColor" stroke-width="2.5" stroke-dasharray="6 6"/><line x1="60" y1="102" x2="180" y2="102" stroke="currentColor" stroke-width="2.5" stroke-dasharray="6 6"/></svg>`,
    `<svg viewBox="0 0 200 130"><path d="M40 100 L70 100 L60 60 L50 60Z" fill="none" stroke="currentColor" stroke-width="3"/><path d="M150 95 q5 -20 -5 -30 q10 5 8 -10 q10 15 -3 40Z" fill="currentColor" stroke="currentColor" stroke-width="2"/><line x1="20" y1="100" x2="180" y2="100" stroke="currentColor" stroke-width="3"/></svg>`,
    `<svg viewBox="0 0 200 130"><path d="M150 20a30 30 0 1 0 0 60 26 26 0 1 1 0-60Z" fill="none" stroke="currentColor" stroke-width="3"/><ellipse cx="60" cy="90" rx="26" ry="14" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="40" cy="80" r="6" fill="none" stroke="currentColor" stroke-width="2.5"/><rect x="90" y="95" width="16" height="10" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>`
  ],
  sophie: [
    `<svg viewBox="0 0 200 130"><path d="M40 60 L80 30 L120 60" fill="none" stroke="currentColor" stroke-width="3"/><rect x="48" y="58" width="64" height="42" fill="none" stroke="currentColor" stroke-width="3"/><rect x="120" y="75" width="26" height="14" rx="2" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M170 30 L176 24 M170 36 L178 36 M170 42 L176 48" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/><circle cx="163" cy="36" r="10" fill="none" stroke="currentColor" stroke-width="2.5"/></svg>`,
    `<svg viewBox="0 0 200 130">${sun(30,22,10)}<rect x="80" y="55" width="60" height="34" rx="6" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="95" cy="94" r="8" fill="none" stroke="currentColor" stroke-width="2.5"/><circle cx="125" cy="94" r="8" fill="none" stroke="currentColor" stroke-width="2.5"/><path d="M80 60 h60" stroke="currentColor" stroke-width="2"/></svg>`,
    `<svg viewBox="0 0 200 130">${sun(160,18,10)}<rect x="20" y="20" width="100" height="60" fill="none" stroke="currentColor" stroke-width="3"/><line x1="70" y1="20" x2="70" y2="80" stroke="currentColor" stroke-width="2.5"/><path d="M20 80 L120 80 L120 100 L20 100 Z" fill="none" stroke="currentColor" stroke-width="2"/><g stroke="currentColor" stroke-width="2" opacity=".8"><line x1="30" y1="95" x2="34" y2="85"/><line x1="42" y1="95" x2="46" y2="85"/><line x1="54" y1="95" x2="58" y2="85"/></g></svg>`,
    `<svg viewBox="0 0 200 130"><path d="M150 20a34 34 0 1 0 0 68 29 29 0 1 1 0-68Z" fill="none" stroke="currentColor" stroke-width="3"/><rect x="30" y="60" width="70" height="16" rx="3" fill="none" stroke="currentColor" stroke-width="3"/><path d="M40 76 v8 M90 76 v8" stroke="currentColor" stroke-width="2.5"/><path d="M100 68 h14 M100 74 h10" stroke="currentColor" stroke-width="2"/></svg>`
  ],
  karim: [
    `<svg viewBox="0 0 200 130">${sun(170,20,12)}<path d="M20 100 h160" stroke="currentColor" stroke-width="3"/><circle cx="60" cy="88" r="10" fill="none" stroke="currentColor" stroke-width="3"/><circle cx="110" cy="88" r="10" fill="none" stroke="currentColor" stroke-width="3"/><path d="M60 88 L85 60 L110 88 M85 60 L85 45" stroke="currentColor" stroke-width="3" fill="none"/></svg>`,

const ORDER = ["amina","julien","sophie","karim","famille"];

/* Zones de vigilance — effets de seuil */
const ZONES = [
  { max: 10, label:"Vigilance jaune", color:"#E8C468" },
  { max: 35, label:"Vigilance orange", color:"#E8622B" },
  { max: 60, label:"Vigilance rouge", color:"#C9622B" },
  { max: Infinity, label:"Seuil critique dépassé", color:"#8B1E1E" }
];

/* =========================================================
   MOTEUR
   ========================================================= */
const state = { screen:"cover", charId:null, actIndex:0, risk:0, awaitingContinue:false, lastChoice:null, prevScreen:"cover" };

function getZoneIndex(risk){ for(let i=0;i<ZONES.length;i++){ if(risk<=ZONES[i].max) return i; } return ZONES.length-1; }

function setTheme(colors){
  const r = document.documentElement.style;
  r.setProperty('--bg', colors.bg); r.setProperty('--panel', colors.panel);
  r.setProperty('--accent', colors.accent); r.setProperty('--accent2', colors.accent2);
}
function resetTheme(){
  const r = document.documentElement.style;
  r.setProperty('--bg', '#1b1815'); r.setProperty('--panel', '#2a2620');
  r.setProperty('--accent', '#c9622b'); r.setProperty('--accent2', '#8b96a0');
}

function goCover(){ resetTheme(); state.screen="cover"; render(); }
function goSelect(){ resetTheme(); state.screen="select"; render(); }
function goSources(from){ state.prevScreen = from || state.screen; state.screen="sources"; render(); }
function backFromSources(){ state.screen = state.prevScreen; render(); }

function selectCharacter(id){
  state.charId=id; state.actIndex=0; state.risk=0; state.awaitingContinue=false; state.lastChoice=null;
  setTheme(CHARACTERS[id].colors); state.screen="game"; render();
}
function makeChoice(i){
  const act = CHARACTERS[state.charId].acts[state.actIndex];
  const choice = act.choices[i];
  state.risk += choice.risk; state.lastChoice = choice; state.awaitingContinue = true; render();
}
function undoChoice(){
  state.risk -= state.lastChoice.risk; state.lastChoice = null; state.awaitingContinue = false; render();
}
function nextAct(){
  const acts = CHARACTERS[state.charId].acts;
  if(state.actIndex < acts.length-1){ state.actIndex++; state.awaitingContinue=false; state.lastChoice=null; render(); }
  else { state.screen="end"; render(); }
}
function replaySame(){ selectCharacter(state.charId); }

/* =========================================================
   RENDU
   ========================================================= */
function render(){
  const stage = document.getElementById('stage');
  if(state.screen==="cover") stage.innerHTML = renderCover();
  else if(state.screen==="select") stage.innerHTML = renderSelect();
  else if(state.screen==="game") stage.innerHTML = renderGame();
  else if(state.screen==="end") stage.innerHTML = renderEnd();
  else if(state.screen==="sources") stage.innerHTML = renderSources();
  wireKarimFlipCard();
}

// Attache les événements de la carte à retourner en JS pur (addEventListener),
// plus robuste que des attributs onclick en ligne pour du contenu injecté dynamiquement.
function wireKarimFlipCard(){
  const card = document.getElementById('flipcard');
  if(!card) return;
  card.addEventListener('click', function(){
    if(card.dataset.side === 'front') toggleFlip();
  });
  card.addEventListener('keydown', function(e){
    if((e.key === 'Enter' || e.key === ' ') && e.target === card && card.dataset.side === 'front'){
      e.preventDefault();
      toggleFlip();
    }
  });
}

  return `

    <div class="cover-actions">

  `;
}

function renderSelect(){

// Table des visuels utilisés par les cartes à retourner de Karim, par index d'acte
const KARIM_FLIP_VISUALS = {
  0: { img: KARIM_IMG2,     caption: "5h45 — avant que la chaleur ne devienne intenable",

function karimFrontFaceHTML(actIndex){
  const v = KARIM_FLIP_VISUALS[actIndex];
  const fitStyle = v.fit === "contain" ? ` style="object-fit:contain; background:#0a0a0a;"` : "";
  return `
    <img class="hero-photo" src="${v.img}" alt="${v.alt}"${fitStyle}>
    <div class="hero-caption">${v.caption}</div>
    <span class="flip-hint">↻ Retourner la carte</span>
  `;
}
function buildKarimBackFace(face, act){
  face.innerHTML = `<div class="face-content">
    <div class="flip-back-inner">
      <p class="flip-eyebrow">La question du jour</p>
      <p class="flip-question">${act.question}</p>
      <div class="flip-choices" id="flipChoicesContainer"></div>
    </div>
  </div>`;
  // Boutons construits en DOM pur + addEventListener : plus robuste que
  // le HTML string + onclick inline, qui peut se comporter différemment
  // selon navigateurs/réglages une fois injecté dynamiquement.
  const container = face.querySelector('#flipChoicesContainer');
  act.choices.forEach((ch, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'flip-choice-btn';
    btn.innerHTML = `<span class="bullet">${String.fromCharCode(65+i)}</span><span>${ch.label}</span>`;
    btn.addEventListener('click', function(e){
      e.stopPropagation();
      makeChoice(i);
    });
    container.appendChild(btn);
  });
}

function illustrationSlot(act){
  // Actes 1 et 2 de Karim : carte à retourner — recto = photo, verso = question + choix (fond noir)
  if(state.charId==='karim' && KARIM_FLIP_VISUALS.hasOwnProperty(state.actIndex)){
    if(state.awaitingContinue){
      // Choix déjà fait : on montre juste la photo, plus de flip ni de choix ici
      return `<div class="flip-card static"><div class="flip-card-face flip-front-face">
        <div class="face-content">${karimFrontFaceHTML(state.actIndex)}</div>
      </div></div>`;
    }
    return `
      <div class="flip-card" id="flipcard" data-side="front" role="button" tabindex="0" aria-label="Retourner la carte pour voir la question">
        <div class="flip-card-face flip-front-face" id="flipcardface">
          <div class="face-content">${karimFrontFaceHTML(state.actIndex)}</div>
        </div>
      </div>`;
  }
  const c = CHARACTERS[state.charId];
  return `<div class="illustration" style="color:${c.colors.accent}">${ILLUS[state.charId][state.actIndex]}</div>`;
}


// Effet 2D pur (zoom + fondu) — volontairement SANS aucune propriété 3D
// (perspective / backface-visibility / rotateY), qui peuvent casser la
// détection de clic sur certains navigateurs même quand tout s'affiche
// correctement. Ceci garantit que les boutons restent toujours cliquables.
function toggleFlip(){
  const card = document.getElementById('flipcard');
  const face = document.getElementById('flipcardface');
  if(!card || !face) return;
  const act = CHARACTERS[state.charId].acts[state.actIndex];
  const showingBack = card.dataset.side === 'back';

  face.style.transition = 'transform .18s ease-in, opacity .18s ease-in';
  face.style.transform = 'scale(.88)';
  face.style.opacity = '0';

  setTimeout(()=>{
    if(showingBack){
      face.className = 'flip-card-face flip-front-face';
      face.innerHTML = `<div class="face-content">${karimFrontFaceHTML(state.actIndex)}</div>`;
      card.dataset.side = 'front';
    } else {
      face.className = 'flip-card-face flip-back-face';
      buildKarimBackFace(face, act);
      card.dataset.side = 'back';
    }
    face.style.transition = 'transform .35s cubic-bezier(.34,1.56,.64,1), opacity .3s ease-out';
    face.style.transform = 'scale(1)';
    face.style.opacity = '1';
  }, 180);
}

// "Retour d'expérience" : le fait s'appuie sur un événement réel et daté, rapporté par la
// presse ou un témoignage (une histoire vécue). "Situation terrain" : le fait est plus général
// — statistique, réglementaire ou explicatif — sans incident précis à l'origine.
const RETOUR_EXPERIENCE_SOURCES = new Set([
  S.figaroVolailles, S.linkedinSinglande, S.telegramme, S.bfmBenouville, S.epochCharpentier, S.ouestFranceAngers
]);
function factLabel(act){
  const srcs = act.sources || [];
  const isRetourExperience = srcs.some(s => RETOUR_EXPERIENCE_SOURCES.has(s));
  return isRetourExperience ? "Retour d'expérience" : "Situation terrain";
}

function renderGame(){
  const c = CHARACTERS[state.charId];
  const act = c.acts[state.actIndex];
  const zoneIdx = getZoneIndex(state.risk);
  const zone = ZONES[zoneIdx];
  const fillPct = Math.max(0, Math.min(100, (state.risk / 80) * 100));

  const isKarimFlipAct = (state.charId==='karim' && KARIM_FLIP_VISUALS.hasOwnProperty(state.actIndex));

  let body;
  if(!state.awaitingContinue){
    if(isKarimFlipAct){
      // Tout est porté par la carte : photo au recto, question + choix au verso. Rien en dessous.
      body = `${illustrationSlot(act)}`;
    } else {
      const choiceButtons = act.choices.map((ch,i)=>`
        <button class="choice-btn" onclick="makeChoice(${i})">
          <span class="bullet">${String.fromCharCode(65+i)}</span>
          <span>${ch.label}</span>
        </button>`).join('');
      body = `
        ${illustrationSlot(act)}
        <div class="narration">${act.narration}</div>
        <div class="choices">${choiceButtons}</div>
      `;
    }
  } else {
    const sourceLinks = (act.sources||[]).map(s=>`<a href="${s.url}" target="_blank" rel="noopener">↗ ${s.label}</a>`).join('');
    body = `
      ${illustrationSlot(act)}
      <div class="narration">${act.narration}</div>
      <div class="consequence-box">${state.lastChoice.consequence}</div>
      <div class="fact-card">
        <span class="flabel">${factLabel(act)}</span>${act.fact}
        <span class="fsource">${sourceLinks}</span>
      </div>
      <div class="continue-row">
        <button class="btn ghost small" onclick="undoChoice()">← Revenir sur mon choix</button>
        <button class="btn" onclick="nextAct()">${state.actIndex < c.acts.length-1 ? "Acte suivant →" : "Voir l'épilogue →"}</button>
      </div>
    `;
  }

  return `
  <div class="panel">
    <div class="topbar">
      <div class="who">
        <span style="color:${c.colors.accent}">${ICONS[state.charId]}</span>
        <div><div class="name">${c.name}</div><div class="tag">${c.tag}</div></div>
      </div>
      <div class="gauge">
        <span class="gauge-label">${zone.label}</span>
        <div class="gauge-track" style="--zone-color:${zone.color}">
          <div class="gauge-fill" style="width:${fillPct}%; background:${zone.color}"></div>
          <div class="gauge-ticks"><span></span><span></span><span></span><span></span></div>
        </div>
      </div>
    </div>
    <div class="act-eyebrow"><p class="eyebrow">Acte ${state.actIndex+1} / ${c.acts.length} — ${act.time}</p></div>
    <h2 class="act-title">${act.title}</h2>
    ${body}
  </div>
  `;
}

function renderEnd(){
  const c = CHARACTERS[state.charId];
  const zoneIdx = getZoneIndex(state.risk);
  const zone = ZONES[zoneIdx];
  const epilogue = c.epilogues[zoneIdx];

  return `
  <div class="zone-banner" style="--zone-color:${zone.color}; background:${zone.color};">
    <p class="eyebrow" style="color:var(--ink); opacity:.7;">Fin de journée — ${c.name}</p>
    <h2>${zone.label}</h2>
  </div>
  <div class="panel">
    <p class="epilogue-text"><b>${epilogue}</b></p>
    <div class="tips-card">
      <span class="flabel">Conseils clés de la journée</span>
      <ul class="tips-list">
        ${(KEY_TIPS[state.charId]||[]).map(tip=>`<li>${tip}</li>`).join('')}
      </ul>
    </div>
    <div class="threshold-note">
      <b>Sur les effets de seuil :</b> les quatre zones ci-dessus ne sont pas un simple dégradé. Au-delà d'un certain niveau accumulé — dans le corps, dans une exploitation, dans un réseau électrique ou dans une infrastructure — l'impact change de nature : il ne s'additionne plus, il bascule. C'est ce basculement, plus que la température en valeur absolue, qui a caractérisé cette canicule.
    </div>
    <div class="end-actions">
      <button class="btn" onclick="replaySame()">Rejouer ${c.name.split(',')[0]}</button>
      <button class="btn ghost" onclick="goSelect()">Essayer un autre personnage →</button>
      <button class="btn ghost small" onclick="goSources('end')">Voir les sources →</button>
    </div>
  </div>
  <footer class="credit">Devoir de mémoire — pensé pour nourrir un vrai retour d'expérience (méthode des 4F : Facts, Feelings, Findings, Future).</footer>
  `;
}

function renderSources(){
  const items = Object.values(S).map(s=>`<li><b>${s.label}</b><a href="${s.url}" target="_blank" rel="noopener">${s.url}</a></li>`).join('');
  return `
  <div class="panel">
    <p class="eyebrow">Pour aller plus loin</p>
    <h2 class="headline" style="font-size:26px; margin:0 0 12px;">Sources mobilisées</h2>
    <p style="opacity:.8; font-size:13.5px; margin-bottom:16px;">Chaque « case réalité » du site s'appuie sur une source vérifiable, listée ci-dessous.</p>
    <ul class="sources-list">${items}</ul>
  </div>
  <div style="text-align:center;"><button class="btn ghost" onclick="backFromSources()">← Retour</button></div>
  `;
}

render();
</script>
</body>
</html>
